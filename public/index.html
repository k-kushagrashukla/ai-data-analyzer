<!DOCTYPE html>
<html>

<head>

<title>AI Business Data Analyzer</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>AI Business Data Analyzer</h1>

<p>Ask questions about your sales data</p>

<input
id="question"
placeholder="Try: Which product sold the most? Total revenue? Best region?"
>

<div class="buttons">

<button onclick="fillQuestion('Which product sold the most?')">Top Product</button>

<button onclick="fillQuestion('Total revenue?')">Total Revenue</button>

<button onclick="fillQuestion('Best region?')">Best Region</button>

</div>

<button class="ask" onclick="ask()">Ask AI</button>

<div id="answer"></div>

<canvas id="chart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
